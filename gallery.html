<!DOCTYPE html>
<html>
<head>
    <title>Gallery - TSWRDCW Nirmal</title>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f4f4;
        }

        h1 {
            text-align: center;
            padding: 20px;
            background-color: #800000;
            color: white;
            margin: 0;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            padding: 30px;
        }

        .gallery img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 2px 2px 10px gray;
            transition: transform 0.4s;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        footer {
            background-color: #800000;
            color: white;
            text-align: center;
            padding: 15px;
        }
    </style>
</head>

<body>

<h1>College Photo Gallery</h1>

<div class="gallery">
    <img src="1.jpg" alt="Event 1">
 <img src="college.jpg" alt="Event 6">
    <img src="2.jpg" alt="Event 2">
    <img src="3.jpg" alt="Event 3">
    <img src="4.jpg" alt="Event 4">
    <img src="5.jpg" alt="Event 5">
    <img src="6.jpeg" alt="Event 6">
 <img src="7.jpeg" alt="Event 7">
 <img src="8.jpeg" alt="Event 8">
 <img src="9.jpeg" alt="Event 9">
 <img src="10.jpeg" alt="Event 10">
 <img src="11.jpeg" alt="Event 11">
 <img src="12.jpeg" alt="Event 12">
 <img src="13.jpeg" alt="Event 13">
 <img src="14.jpeg" alt="Event 14">
 <img src="15.jpeg" alt="Event 15">
</div>

<footer>
    <p>&copy; 2026 TSWRDCW Nirmal</p>
</footer>

</body>
</html>
